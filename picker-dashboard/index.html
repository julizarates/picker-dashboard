<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picker Rankings — Turbo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#0d0d12;--surface:#16161f;--surface2:#1e1e2a;--border:#2a2a3a;
  --text:#e8e8f0;--muted:#6b6b88;--gold:#f5c842;--silver:#b0b8c8;
  --bronze:#cd7f32;--green:#34d399;--red:#f87171;--accent:#818cf8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.hero{background:linear-gradient(135deg,#13131f,#1a1025);padding:40px 32px 32px;border-bottom:1px solid var(--border);text-align:center;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(129,140,248,0.12);border:1px solid rgba(129,140,248,0.3);border-radius:20px;padding:4px 14px;font-size:11px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;font-weight:500;}
.hero h1{font-size:28px;font-weight:600;margin-bottom:8px;background:linear-gradient(135deg,#e8e8f0,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:14px;color:var(--muted);margin-bottom:28px;}
.updated{font-size:11px;color:var(--muted);margin-top:8px;font-family:'DM Mono',monospace;}
.search-bar{display:flex;gap:12px;max-width:540px;margin:0 auto;}
.search-bar select{flex:1;height:44px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:0 16px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}
.search-bar select:focus{outline:none;border-color:var(--accent);}
.search-bar button{height:44px;padding:0 24px;background:var(--accent);color:white;font-weight:600;cursor:pointer;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;transition:opacity 0.2s;}
.search-bar button:hover{opacity:0.85;}
.main{padding:32px;max-width:1000px;margin:0 auto;}
.section-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:20px;}
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:40px;}
.podium-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 20px;text-align:center;cursor:pointer;transition:transform 0.2s;}
.podium-card:hover{transform:translateY(-2px);}
.podium-card.gold{border-color:rgba(245,200,66,0.4);background:linear-gradient(160deg,#1e1a0f,#16161f);}
.podium-card.silver{border-color:rgba(176,184,200,0.3);}
.podium-card.bronze{border-color:rgba(205,127,50,0.3);}
.medal{font-size:32px;margin-bottom:12px;display:block;}
.rank-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;margin-bottom:8px;}
.gold .rank-num{color:var(--gold);}.silver .rank-num{color:var(--silver);}.bronze .rank-num{color:var(--bronze);}
.picker-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.picker-score{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;margin:12px 0 4px;}
.gold .picker-score{color:var(--gold);}.silver .picker-score{color:var(--silver);}.bronze .picker-score{color:var(--bronze);}
.score-label{font-size:11px;color:var(--muted);margin-bottom:8px;}
.mini-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:14px;}
.mini-metric{background:var(--surface2);border-radius:8px;padding:8px;font-size:11px;}
.mini-metric .val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;display:block;margin-bottom:2px;}
.mini-metric .lbl{color:var(--muted);font-size:10px;}
.good{color:var(--green);}.bad{color:var(--red);}.neutral{color:#60a5fa;}
.rankings-table{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:40px;}
.table-header{display:grid;grid-template-columns:48px 1fr 80px 80px 80px 80px 80px;gap:8px;padding:12px 20px;background:var(--surface2);font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
.table-row{display:grid;grid-template-columns:48px 1fr 80px 80px 80px 80px 80px;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;font-size:13px;cursor:pointer;transition:background 0.15s;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:var(--surface2);}
.rank-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;}
.rank-1{background:rgba(245,200,66,0.15);color:var(--gold);}
.rank-2{background:rgba(176,184,200,0.12);color:var(--silver);}
.rank-3{background:rgba(205,127,50,0.12);color:var(--bronze);}
.rank-n{background:var(--surface2);color:var(--muted);}
.bar-wrap{width:100%;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:3px;}
.bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:32px;display:none;}
.detail-panel.active{display:block;}
.detail-header{display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.avatar{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0;}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.metric-card{background:var(--surface2);border-radius:12px;padding:16px;}
.metric-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;margin-bottom:4px;}
.metric-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.metric-delta{font-size:11px;font-family:'DM Mono',monospace;}
.tips-section{margin-top:20px;}
.tips-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.tip-item{display:flex;gap:12px;align-items:flex-start;padding:12px;background:var(--surface2);border-radius:10px;margin-bottom:8px;font-size:13px;line-height:1.5;}
.tip-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px;}
.loading-tips{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;}
.dot-pulse{display:flex;gap:4px;}
.dot-pulse span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite;}
.dot-pulse span:nth-child(2){animation-delay:0.2s;}
.dot-pulse span:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.close-detail{margin-left:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:6px 12px;cursor:pointer;}
.close-detail:hover{color:var(--text);}
.empty-state{text-align:center;padding:60px 32px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
@media(max-width:640px){
  .podium{grid-template-columns:1fr;}
  .table-header,.table-row{grid-template-columns:36px 1fr 60px 60px;}
  .table-header span:nth-child(n+6),.table-row div:nth-child(n+6){display:none;}
  .metrics-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-badge">Rendimiento Turbo</div>
  <h1>Ranking de Pickers</h1>
  <p>Busca tu tienda y ve cómo estás vs el equipo</p>
  <div class="search-bar">
    <select id="storeSelect"><option value="">Selecciona una tienda...</option></select>
    <button onclick="loadStore()">Ver ranking</button>
  </div>
  <div class="updated" id="updatedAt"></div>
</div>
<div class="main">
  <div id="content">
    <div class="empty-state"><div class="empty-icon">🏆</div><p>Selecciona una tienda para ver el ranking</p></div>
  </div>
</div>
<script>
let allData = [];

function score(p){
  return Math.round(100-(p.cancelaciones*15+p.stockouts*10+p.defectos*20+Math.max(0,p.velocidad-4)*8));
}
function scoreLW(p){
  return Math.round(100-(p.cancelaciones_lw*15+p.stockouts_lw*10+p.defectos_lw*20+Math.max(0,p.velocidad_lw-4)*8));
}
function medal(r){
  if(r===1)return{emoji:'🥇',cls:'gold',label:'#1 ORO'};
  if(r===2)return{emoji:'🥈',cls:'silver',label:'#2 PLATA'};
  if(r===3)return{emoji:'🥉',cls:'bronze',label:'#3 BRONCE'};
  return{emoji:'',cls:'',label:`#${r}`};
}
function delta(curr,prev){
  const d=curr-prev;
  if(Math.abs(d)<0.05)return{text:'—',cls:'neutral'};
  const better=curr<prev;
  return{text:(better?'▼ ':'▲ ')+Math.abs(d).toFixed(1)+'%',cls:better?'good':'bad'};
}
function scoreDelta(curr,prev){
  const d=curr-prev;
  if(Math.abs(d)<1)return{text:'—',cls:'neutral'};
  return{text:(d>0?'+':'')+d+' pts',cls:d>0?'good':'bad'};
}

fetch('data/data.json')
  .then(r=>r.json())
  .then(data=>{
    allData=data;
    const stores=[...new Set(data.map(p=>p.tienda))].sort();
    const sel=document.getElementById('storeSelect');
    stores.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
    document.getElementById('updatedAt').textContent='Última actualización: '+new Date().toLocaleDateString('es',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  })
  .catch(()=>document.getElementById('content').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><p>No se pudo cargar data.json</p></div>');

function loadStore(){
  const store=document.getElementById('storeSelect').value;
  if(!store)return;
  const pickers=allData.filter(p=>p.tienda===store).map(p=>({...p,score:score(p),scoreLW:scoreLW(p)})).sort((a,b)=>b.score-a.score);
  if(!pickers.length){document.getElementById('content').innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><p>No hay datos para esta tienda</p></div>';return;}

  let html='';
  if(pickers.length>=2){
    html+=`<p class="section-title">Podio de hoy — ${store}</p><div class="podium">`;
    const top3=pickers.slice(0,Math.min(3,pickers.length));
    const order=pickers.length===1?[0]:pickers.length===2?[1,0]:[1,0,2];
    order.forEach(i=>{
      if(!top3[i])return;
      const p=top3[i];const m=medal(i+1);const sd=scoreDelta(p.score,p.scoreLW);
      html+=`<div class="podium-card ${m.cls}" onclick='showDetail(${JSON.stringify(p)},${i+1})'>
        <span class="medal">${m.emoji}</span>
        <div class="rank-num">${m.label}</div>
        <div class="picker-name">${p.picker}</div>
        <div class="picker-score">${p.score}</div>
        <div class="score-label">puntos</div>
        <div style="font-size:11px" class="${sd.cls}">${sd.text} vs semana pasada</div>
        <div class="mini-metrics">
          <div class="mini-metric"><span class="val ${p.cancelaciones<=p.cancelaciones_lw?'good':'bad'}">${p.cancelaciones.toFixed(1)}%</span><span class="lbl">Cancelaciones</span></div>
          <div class="mini-metric"><span class="val ${p.stockouts<=p.stockouts_lw?'good':'bad'}">${p.stockouts.toFixed(1)}%</span><span class="lbl">Stockouts</span></div>
          <div class="mini-metric"><span class="val ${p.defectos<=p.defectos_lw?'good':'bad'}">${p.defectos.toFixed(1)}%</span><span class="lbl">Defectos</span></div>
          <div class="mini-metric"><span class="val ${p.velocidad<=p.velocidad_lw?'good':'bad'}">${p.velocidad.toFixed(1)}m</span><span class="lbl">Velocidad</span></div>
        </div>
      </div>`;
    });
    html+='</div>';
  }

  html+=`<div class="detail-panel" id="detailPanel"></div>`;
  html+=`<p class="section-title">Ranking completo</p><div class="rankings-table">
    <div class="table-header"><span>#</span><span>Picker</span><span style="text-align:right">Score</span><span style="text-align:right">Cancel</span><span style="text-align:right">SO</span><span style="text-align:right">Defectos</span><span style="text-align:right">Veloc.</span></div>`;

  const maxScore=pickers[0].score;
  pickers.forEach((p,i)=>{
    const r=i+1;const sd=scoreDelta(p.score,p.scoreLW);
    const barColor=r===1?'var(--gold)':r===2?'var(--silver)':r===3?'var(--bronze)':'var(--accent)';
    html+=`<div class="table-row" onclick='showDetail(${JSON.stringify(p)},${r})'>
      <div><div class="rank-badge rank-${r<=3?r:'n'}">${r}</div></div>
      <div><div style="font-weight:500">${p.picker}</div><div style="font-size:11px;margin-top:2px" class="${sd.cls}">${sd.text}</div></div>
      <div style="text-align:right;font-family:'DM Mono',monospace;font-weight:500">${p.score}<div class="bar-wrap"><div class="bar-fill" style="width:${(p.score/maxScore*100).toFixed(0)}%;background:${barColor}"></div></div></div>
      <div style="text-align:right;font-family:'DM Mono',monospace;font-size:12px" class="${p.cancelaciones<=p.cancelaciones_lw?'good':'bad'}">${p.cancelaciones.toFixed(1)}%</div>
      <div style="text-align:right;font-family:'DM Mono',monospace;font-size:12px" class="${p.stockouts<=p.stockouts_lw?'good':'bad'}">${p.stockouts.toFixed(1)}%</div>
      <div style="text-align:right;font-family:'DM Mono',monospace;font-size:12px" class="${p.defectos<=p.defectos_lw?'good':'bad'}">${p.defectos.toFixed(1)}%</div>
      <div style="text-align:right;font-family:'DM Mono',monospace;font-size:12px" class="${p.velocidad<=p.velocidad_lw?'good':'bad'}">${p.velocidad.toFixed(1)}m</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

async function showDetail(picker,rank){
  const panel=document.getElementById('detailPanel');
  if(!panel)return;
  panel.classList.add('active');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  const m=medal(rank);
  const initials=picker.picker.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const avatarColors=['rgba(129,140,248,0.2)','rgba(52,211,153,0.2)','rgba(251,191,36,0.2)'];
  const sd=scoreDelta(picker.score,picker.scoreLW);
  panel.innerHTML=`
    <div class="detail-header">
      <div class="avatar" style="background:${avatarColors[(rank-1)%3]};color:var(--text)">${initials}</div>
      <div>
        <div style="font-size:18px;font-weight:600">${picker.picker}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${picker.tienda} · ${m.emoji} ${m.label}</div>
      </div>
      <div style="margin-left:16px;text-align:center">
        <div style="font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:${rank===1?'var(--gold)':rank===2?'var(--silver)':rank===3?'var(--bronze)':'var(--text)'}">${picker.score}</div>
        <div style="font-size:11px;color:var(--muted)">puntos</div>
        <div style="font-size:11px;margin-top:2px" class="${sd.cls}">${sd.text}</div>
      </div>
      <button class="close-detail" onclick="document.getElementById('detailPanel').classList.remove('active')">Cerrar</button>
    </div>
    <div class="metrics-grid">
      ${metricCard('Cancelaciones',picker.cancelaciones,picker.cancelaciones_lw,'%')}
      ${metricCard('Stockouts',picker.stockouts,picker.stockouts_lw,'%')}
      ${metricCard('Defectos',picker.defectos,picker.defectos_lw,'%')}
      ${metricCard('Velocidad',picker.velocidad,picker.velocidad_lw,'m')}
    </div>
    <div class="tips-section">
      <div class="tips-title">Consejos personalizados</div>
      <div id="tipsContent"><div class="loading-tips"><div class="dot-pulse"><span></span><span></span><span></span></div> Generando consejos...</div></div>
    </div>`;
  await generateTips(picker,rank);
}

function metricCard(label,curr,prev,unit){
  const d=delta(curr,prev);const better=curr<=prev;
  return`<div class="metric-card"><div class="metric-lbl">${label}</div><div class="metric-val ${better?'good':'bad'}">${curr.toFixed(1)}${unit}</div><div style="font-size:11px;color:var(--muted);margin-bottom:6px">LW: ${prev.toFixed(1)}${unit}</div><div class="metric-delta ${d.cls}">${d.text}</div></div>`;
}

async function generateTips(picker,rank){
  const worse=[];
  if(picker.cancelaciones>picker.cancelaciones_lw)worse.push(`cancelaciones subieron de ${picker.cancelaciones_lw}% a ${picker.cancelaciones}%`);
  if(picker.stockouts>picker.stockouts_lw)worse.push(`stockouts subieron de ${picker.stockouts_lw}% a ${picker.stockouts}%`);
  if(picker.defectos>picker.defectos_lw)worse.push(`defectos subieron de ${picker.defectos_lw}% a ${picker.defectos}%`);
  if(picker.velocidad>picker.velocidad_lw)worse.push(`velocidad bajó de ${picker.velocidad_lw}m a ${picker.velocidad}m`);
  const prompt=`Eres coach operacional de Rappi Turbo. El picker ${picker.picker} está en el puesto #${rank}.\nMétricas: cancelaciones ${picker.cancelaciones}% (LW:${picker.cancelaciones_lw}%), stockouts ${picker.stockouts}% (LW:${picker.stockouts_lw}%), defectos ${picker.defectos}% (LW:${picker.defectos_lw}%), velocidad ${picker.velocidad}m (LW:${picker.velocidad_lw}m).\n${worse.length?'Empeoró en: '+worse.join(', '):'Todas las métricas mejoraron.'}\nGenera exactamente 3 consejos cortos. Responde SOLO JSON sin nada más:\n[{"icono":"🎯","consejo":"texto"},{"icono":"⚡","consejo":"texto"},{"icono":"💡","consejo":"texto"}]`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(b=>b.text||'').join('')||'[]';
    const tips=JSON.parse(text.replace(/```json|```/g,'').trim());
    document.getElementById('tipsContent').innerHTML=tips.map(t=>`<div class="tip-item"><div class="tip-icon" style="background:rgba(129,140,248,0.12)">${t.icono}</div><span>${t.consejo}</span></div>`).join('');
  }catch(e){
    document.getElementById('tipsContent').innerHTML=`
      <div class="tip-item"><div class="tip-icon" style="background:rgba(129,140,248,0.12)">🎯</div><span>Revisa los productos de Fruver al inicio del turno para evitar stockouts.</span></div>
      <div class="tip-item"><div class="tip-icon" style="background:rgba(52,211,153,0.12)">⚡</div><span>Confirma el estado del producto antes de agregarlo a la canasta.</span></div>
      <div class="tip-item"><div class="tip-icon" style="background:rgba(251,191,36,0.12)">💡</div><span>Memoriza la ubicación de los top 20 productos para ganar velocidad.</span></div>`;
  }
}
</script>
</body>
</html>
